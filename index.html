<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Ingredia AI</title>

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;

      background:

        /* warmes oranges Licht links */
        radial-gradient(circle at left center,
          rgba(255, 170, 90, 0.22) 0%,
          rgba(255, 170, 90, 0.12) 18%,
          rgba(255, 170, 90, 0.04) 35%,
          transparent 55%),

        /* gelber Ring oben links */
        radial-gradient(circle at 18% 22%,
          transparent 0 90px,
          rgba(255, 210, 90, 0.08) 90px 94px,
          transparent 94px),

        /* großer Ring unten rechts */
        radial-gradient(circle at 82% 78%,
          transparent 0 140px,
          rgba(255, 190, 70, 0.05) 140px 144px,
          transparent 144px),

        /* kleiner Ring rechts oben */
        radial-gradient(circle at 75% 25%,
          transparent 0 55px,
          rgba(255, 220, 120, 0.06) 55px 58px,
          transparent 58px),

        /* leichte grüne Wärme */
        radial-gradient(circle at bottom right,
          rgba(180, 220, 170, 0.10),
          transparent 30%),

        #faf7f2;

      color: #1d1d1f;

      min-height: 100vh;

      display: flex;
      justify-content: center;
      align-items: center;

      overflow-x: hidden;
    }

    .container {
      width: 100%;
      max-width: 950px;

      display: flex;
      flex-direction: column;
      align-items: center;

      padding: 40px;

      position: relative;
      z-index: 2;
    }

    .logo {
      width: 320px;
      height: 320px;

      object-fit: cover;

      margin-bottom: -20px;

      filter: drop-shadow(0 10px 25px rgba(0,0,0,0.10));
    }

    h1 {
      font-size: 78px;
      font-weight: 700;

      letter-spacing: -3px;

      margin-bottom: 22px;

      text-align: center;

      max-width: 850px;

      line-height: 1.05;
    }

    .subtitle {
      font-size: 24px;

      color: #5f5f5f;

      margin-bottom: 55px;

      text-align: center;

      max-width: 720px;

      line-height: 1.6;
    }

    .input-box {
      width: 100%;
      max-width: 720px;

      background: rgba(255,255,255,0.72);

      backdrop-filter: blur(14px);

      border: 1px solid rgba(255,255,255,0.6);

      border-radius: 30px;

      padding: 14px;

      display: flex;
      align-items: center;

      box-shadow:
        0 10px 30px rgba(0,0,0,0.05),
        inset 0 1px 0 rgba(255,255,255,0.7);

      margin-bottom: 40px;
    }

    input {
      flex: 1;

      border: none;
      outline: none;

      font-size: 20px;

      padding: 18px 24px;

      background: transparent;

      color: #111;
    }

    input::placeholder {
      color: #8b8b8b;
    }

    .generate-btn {
      border: none;

      background: linear-gradient(135deg, #ff7b54, #ffb26b);

      color: white;

      padding: 18px 34px;

      border-radius: 18px;

      font-size: 18px;
      font-weight: 600;

      cursor: pointer;

      transition: all 0.25s ease;

      box-shadow: 0 8px 20px rgba(255,123,84,0.30);
    }

    .generate-btn:hover {
      transform: translateY(-2px) scale(1.03);
    }

    .tags {
      display: flex;
      gap: 15px;

      flex-wrap: wrap;

      justify-content: center;
    }

    .tag {
      background: rgba(255,255,255,0.75);

      backdrop-filter: blur(10px);

      padding: 14px 24px;

      border-radius: 999px;

      font-size: 17px;

      cursor: pointer;

      transition: 0.25s;

      border: 1px solid rgba(255,255,255,0.7);

      box-shadow: 0 4px 15px rgba(0,0,0,0.04);
    }

    .tag:hover {
      transform: translateY(-3px);

      background: #ff7b54;

      color: white;
    }

    .footer {
      position: absolute;
      bottom: 20px;

      color: #999;

      font-size: 14px;
    }

    @media (max-width: 700px) {

      .container {
        padding: 25px;
      }

      .logo {
        width: 210px;
        height: 210px;

        margin-bottom: -5px;
      }

      h1 {
        font-size: 48px;

        line-height: 1.1;
      }

      .subtitle {
        font-size: 18px;

        margin-bottom: 40px;
      }

      .input-box {
        flex-direction: column;

        gap: 12px;

        padding: 12px;
      }

      .generate-btn {
        width: 100%;
      }

    }

  </style>
</head>

<body>

  <div class="container">

    <!-- LOGO -->
    <img src="logo-ingredia.jpg" class="logo">

    <h1>Your kitchen already has dinner.</h1>

    <div class="subtitle">
      Turn ingredients you already own into fast, delicious meals with AI.
    </div>

    <div class="input-box">

      <input type="text" placeholder="Eggs, cheese, tomatoes...">

      <button class="generate-btn">
        Generate
      </button>

    </div>

    <div class="tags">

      <div class="tag">Healthy</div>

      <div class="tag">Quick Meals</div>

      <div class="tag">High Protein</div>

      <div class="tag">Desserts</div>

    </div>

  </div>

  <div class="footer">
    Designed by AQA.
  </div>

</body>
</html>
