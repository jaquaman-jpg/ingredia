<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>RecipeAI</title>

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f5f5f7;
      color: #111;

      height: 100vh;

      display: flex;
      justify-content: center;
      align-items: center;

      overflow: hidden;
    }

    .container {
      width: 100%;
      max-width: 900px;

      display: flex;
      flex-direction: column;
      align-items: center;

      padding: 40px;
    }

    h1 {
      font-size: 82px;
      font-weight: 700;

      letter-spacing: -3px;

      margin-bottom: 20px;

      text-align: center;
    }

    .subtitle {
      font-size: 24px;
      color: #666;

      margin-bottom: 60px;

      text-align: center;

      max-width: 700px;
      line-height: 1.5;
    }

    .input-box {
      width: 100%;
      max-width: 700px;

      background: white;

      border-radius: 28px;

      padding: 12px;

      display: flex;
      align-items: center;

      box-shadow: 0 10px 30px rgba(0,0,0,0.06);

      margin-bottom: 35px;
    }

    input {
      flex: 1;

      border: none;
      outline: none;

      font-size: 20px;

      padding: 18px 24px;

      background: transparent;
    }

    .generate-btn {
      border: none;

      background: #111;
      color: white;

      padding: 18px 30px;

      border-radius: 18px;

      font-size: 18px;

      cursor: pointer;

      transition: 0.3s;
    }

    .generate-btn:hover {
      transform: scale(1.04);
    }

    .tags {
      display: flex;
      gap: 15px;

      flex-wrap: wrap;

      justify-content: center;
    }

    .tag {
      background: white;

      padding: 14px 24px;

      border-radius: 999px;

      font-size: 17px;

      cursor: pointer;

      transition: 0.25s;

      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }

    .tag:hover {
      transform: translateY(-3px);
      background: #111;
      color: white;
    }

    .footer {
      position: absolute;
      bottom: 20px;
      color: #999;
      font-size: 14px;
    }

    @media (max-width: 700px) {

      h1 {
        font-size: 52px;
      }

      .subtitle {
        font-size: 18px;
      }

      .input-box {
        flex-direction: column;
        gap: 12px;
      }

      .generate-btn {
        width: 100%;
      }

    }

  </style>
</head>

  <div>Ingredia</div>

<body>

  <div class="container">

    <h1>Cook with what you have.</h1>

    <div class="subtitle">
      AI recipes from ingredients already in your kitchen.
    </div>

    <div class="input-box">

      <input type="text" placeholder="Eggs, cheese, tomatoes...">

      <button class="generate-btn">
        Generate
      </button>

    </div>

    <div class="tags">

      <div class="tag">Sweet</div>

      <div class="tag">Savory</div>

      <div class="tag">Snack</div>

      <div class="tag">Meal</div>

    </div>

  </div>

  <div class="footer">
    Designed by AQA.
  </div>

</body>
</html>
